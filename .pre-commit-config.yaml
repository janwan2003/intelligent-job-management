repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(backend|worker|runtime|shared)/
      - id: ruff-format
        files: ^(backend|worker|runtime|shared)/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        name: mypy (shared + backend)
        files: ^(shared|backend)/
        additional_dependencies: [fastapi>=0.104.0, pydantic>=2.5.0, httpx>=0.25.0, pytest>=7.4.0]
        args: [--config-file=backend/pyproject.toml]
      - id: mypy
        name: mypy (worker)
        files: ^worker/
        additional_dependencies: [nats-py>=2.6.0, psycopg>=3.1.0]
        args: [--strict, --python-version=3.12]

  - repo: local
    hooks:
      - id: frontend-eslint
        name: frontend eslint
        entry: pnpm --dir frontend lint
        language: system
        files: ^frontend/src/
        types_or: [ts, tsx]
        pass_filenames: false
      - id: frontend-typecheck
        name: frontend typecheck
        entry: pnpm --dir frontend exec tsc --noEmit
        language: system
        files: ^frontend/src/
        types_or: [ts, tsx]
        pass_filenames: false
