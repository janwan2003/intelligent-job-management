services:
  postgres:
    image: postgres:18
    container_name: ijm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ijm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ../data/pg:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  nats:
    image: nats:2.12-alpine
    container_name: ijm-nats
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: ijm-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ijm
      NATS_URL: nats://nats:4222
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - ../backend/src:/app/src
      - ../config:/app/config:ro
      - ../data:/data:ro
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 512M

  worker:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    container_name: ijm-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ijm
      NATS_URL: nats://nats:4222
      HOST_ROOT: /host
      # HOST_PROJECT_ROOT must be the absolute host path of the project root.
      # docker run -v paths are resolved by the Docker daemon on the HOST, not
      # inside the worker container.  ${PWD}/.. works when running from infra/.
      HOST_PROJECT_ROOT: ${HOST_PROJECT_ROOT:-${PWD}/..}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ..:/host
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ijm-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 256M
